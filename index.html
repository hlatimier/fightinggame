<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<title>World Battle Arena - Character Select</title>

<style>

*{
box-sizing:border-box;
}

body{

margin:0;
background:#050505;
font-family:"Arial Black",Arial,sans-serif;
color:white;
overflow:hidden;

}


.screen{

height:100vh;
display:flex;
flex-direction:column;
align-items:center;

background:
radial-gradient(circle,#222,#000);

}



/* ==========================
        CARTE DU MONDE
========================== */


.world{


background-size:cover;
background-position:center;

border:5px solid #fff;

box-shadow:
0 0 30px #00ffff,
inset 0 0 30px black;

position:relative;

}



.marker{

position:absolute;

width:35px;
height:35px;

background:#ffcc00;

border-radius:50%;

border:4px solid white;

box-shadow:
0 0 15px yellow;

animation:pulse 1s infinite;

}



@keyframes pulse{

50%{
transform:scale(1.3);
}

}


/* positions des étapes */

.europe{

left:430px;
top:100px;

}


.asia{

left:700px;
top:120px;

}


.america{

left:200px;
top:110px;

}




/* ==========================
          TITRE
========================== */


.title{

font-size:36px;

color:#ffdd00;

margin:10px;

text-shadow:
4px 4px #900,
0 0 15px orange;

}


/* ==========================
       SELECTION
========================== */


.grid{

display:grid;

grid-template-columns:
repeat(8,95px);

gap:10px;

}



.character{

height:115px;

background:#111;

border:3px solid #555;

text-align:center;

cursor:pointer;

}


.character:hover,
.character.selected{

border-color:#ffff00;

box-shadow:
0 0 20px yellow;

}




.face{

width:65px;
height:65px;

margin:8px auto;

border-radius:50%;

border:3px solid black;

background:
linear-gradient(#ffd0a0,#8b4513);

}



.red .face{

background:
linear-gradient(#ff5555,#700);

}


.blue .face{

background:
linear-gradient(#55aaff,#004);

}


.green .face{

background:
linear-gradient(#55dd55,#064);

}



.name{

font-size:12px;

}



/* ==========================
          INFOS
========================== */


.info{

margin-top:15px;

font-size:25px;

color:#00ffff;

text-shadow:
2px 2px blue;

}



</style>


</head>


<body>



<div class="screen">



<div class="world">

<img src="worldmap.png"></img>



</div>




<div class="title">

PLAYER 1 SELECT

</div>




<div class="grid" id="grid">


</div>




<div class="info" id="info">

CHOISIS TON COMBATTANT

</div>



</div>





<script>



const fighters=[


["RYU","red"],
["KEN","red"],
["LUNA","blue"],
["KAITO","blue"],
["GORAN","red"],
["ZEN","green"],
["MAYA","green"],
["BLADE","red"],


["TIGER","red"],
["AKIRA","blue"],
["NOVA","green"],
["RAIDER","red"],
["FANG","blue"],
["KIRA","green"],
["ZERO","red"],
["MAX","blue"]


];



let grid=document.getElementById("grid");

let selected=0;



fighters.forEach((f,i)=>{


let div=document.createElement("div");


div.className="character "+f[1];


div.innerHTML=`

<div class="face"></div>

<div class="name">
${f[0]}
</div>

`;



div.onclick=()=>{

selected=i;

update();


};



grid.appendChild(div);



});





function update(){


document
.querySelectorAll(".character")
.forEach(x=>x.classList.remove("selected"));



document
.querySelectorAll(".character")[selected]
.classList.add("selected");



document.getElementById("info").innerHTML=

"PLAYER 1 : "+fighters[selected][0];



}





document.addEventListener("keydown",e=>{


let x=selected%8;

let y=Math.floor(selected/8);



if(e.key==="ArrowRight")x++;

if(e.key==="ArrowLeft")x--;

if(e.key==="ArrowDown")y++;

if(e.key==="ArrowUp")y--;



if(x<0)x=7;

if(x>7)x=0;

if(y<0)y=1;

if(y>1)y=0;



selected=y*8+x;



update();



if(e.key==="Enter"){


document.getElementById("info").innerHTML=

fighters[selected][0]+" READY !";

}



});





update();



</script>


</body>
</html>
