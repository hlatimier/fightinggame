<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Arcade Fighter Character Select</title>
<link rel="stylesheet" href="style.css">
</head>



<body>

<div class="screen">



<div class="world">


<div class="plane">
✈
</div>


<div class="place usa">
USA
</div>


<div class="place brazil">
BRAZIL
</div>


<div class="place france">
FRANCE
</div>


<div class="place china">
CHINA
</div>


<div class="place japan">
JAPAN
</div>


</div>




<div class="title">
PLAYER 1 SELECT
</div>



<div class="grid" id="grid">

</div>



<div class="info" id="info">

CHOISIS TON COMBATTANT

</div>



</div>



<script>


const fighters=[

["RYU","red"],
["KEN","red"],
["CHUN-LI","blue"],
["GUILE","blue"],
["ZANGIEF","red"],
["DHALSIM","green"],
["CAMMY","green"],
["BALROG","red"],

["SAGAT","red"],
["VEGA","blue"],
["BISON","red"],
["AKIRA","green"],
["TIGER","red"],
["KIRA","blue"],
["KUMA","green"],
["MAX","red"]

];



const grid=document.getElementById("grid");



let selected=0;



fighters.forEach((fighter,index)=>{


let div=document.createElement("div");


div.className=
"character "+fighter[1];


div.innerHTML=

`

<div class="face"></div>

<div class="name">
${fighter[0]}
</div>

`;


div.onclick=function(){

selected=index;
update();

};


grid.appendChild(div);


});



function update(){


document.querySelectorAll(".character")
.forEach(c=>c.classList.remove("selected"));


document.querySelectorAll(".character")[selected]
.classList.add("selected");


document.getElementById("info").innerHTML=
"PLAYER 1 : "+fighters[selected][0];


}



document.addEventListener("keydown",function(e){


let x=selected%8;
let y=Math.floor(selected/8);



if(e.key=="ArrowRight"){
x++;
}

if(e.key=="ArrowLeft"){
x--;
}

if(e.key=="ArrowDown"){
y++;
}

if(e.key=="ArrowUp"){
y--;
}



if(x<0)x=7;
if(x>7)x=0;

if(y<0)y=1;
if(y>1)y=0;



selected=y*8+x;


update();



if(e.key=="Enter"){


document.getElementById("info").innerHTML=

fighters[selected][0]+" READY !";


}



});



update();


</script>


</body>
</html>
